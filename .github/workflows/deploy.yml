name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test_api.py and capture output
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PYTHONUTF8: '1'
        run: |
          set +e
          python -m pytest tests/test_api.py -v --tb=long --no-header -rA 2>&1 | tee test_api_output.txt
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload test output as commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b ci-test-output
          git add -f test_api_output.txt
          git commit -m "ci: test_api.py output (auto-generated)" --allow-empty
          git push -f origin ci-test-output

      - name: Package versions
        if: always()
        run: |
          python --version
          pip list 2>/dev/null | grep -iE "fastapi|pydantic|httpx|pytest|anyio|starlette|uvicorn"

      - name: Fail if tests failed
        if: env.EXIT_CODE != '0'
        run: |
          echo "Tests failed with exit code ${{ env.EXIT_CODE }}"
          exit 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            cd /opt/clothing-decision
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            systemctl restart clothing-decision
            sleep 3
            systemctl status clothing-decision --no-pager

      - name: Verify deployment
        run: |
          sleep 5
          curl -f -m 10 http://${{ secrets.DEPLOY_HOST }}:8000/health || exit 1
          echo "Deployment verified: API is healthy"
