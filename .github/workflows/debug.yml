name: Debug Tests

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test_api.py with full traceback
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PYTHONUTF8: '1'
        run: |
          python -m pytest tests/test_api.py -v --tb=long --no-header -rA

      - name: Run test_api.py::test_set_body_profile only
        if: failure()
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PYTHONUTF8: '1'
        run: |
          python -m pytest tests/test_api.py::test_set_body_profile -v --tb=long

      - name: Run test_api.py::test_health only
        if: failure()
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PYTHONUTF8: '1'
        run: |
          python -m pytest tests/test_api.py::test_health -v --tb=long

      - name: Python version and package info
        run: |
          python --version
          pip show fastapi pydantic httpx pytest
