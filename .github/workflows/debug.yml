name: Debug Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug - check files
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Check design docs ==="
          ls -la docs/design/
          echo "=== Check file encoding ==="
          file docs/design/*.md
          echo "=== Check BOM ==="
          xxd docs/design/设计方案_v3_superpowers.md | head -3
          echo "=== Check pytest version ==="
          python -m pytest --version
          echo "=== Check installed packages ==="
          pip list

      - name: Run tests with full output
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PYTHONUTF8: '1'
        run: |
          python -m pytest -v --tb=long --no-header 2>&1 | head -200

      - name: Run single test file
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PYTHONUTF8: '1'
        run: |
          echo "=== Running test_api.py ==="
          python -m pytest tests/test_api.py -v --tb=short 2>&1 | tail -30
          echo "=== Running test_design_spec.py ==="
          python -m pytest tests/test_design_spec.py -v --tb=short 2>&1 | tail -30
          echo "=== Running test_superpower_fixes.py ==="
          python -m pytest tests/test_superpower_fixes.py -v --tb=short 2>&1 | tail -30
