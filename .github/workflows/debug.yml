name: Debug Tests

on:
  push:
    branches: [main, debug-ci]
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test_api.py only
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PYTHONUTF8: '1'
        run: |
          python -m pytest tests/test_api.py -v --tb=long

      - name: Run test_design_spec.py only
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PYTHONUTF8: '1'
        run: |
          python -m pytest tests/test_design_spec.py -v --tb=long

      - name: Run test_design_functional.py only
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PYTHONUTF8: '1'
        run: |
          python -m pytest tests/test_design_functional.py -v --tb=long

      - name: Run test_superpower_fixes.py only
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PYTHONUTF8: '1'
        run: |
          python -m pytest tests/test_superpower_fixes.py -v --tb=long
